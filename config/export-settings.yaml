# Export configuration for full_export_book
# Controls Pandoc output formats, TOC behavior, section ordering, and export defaults.
# All export_defaults can be overridden via CLI flags (CLI takes priority).

# Supported output formats and their Pandoc targets
formats:
  markdown: gfm       # GitHub-Flavored Markdown
  pdf: pdf
  epub: epub
  docx: docx
  html: html

# Default TOC depth for auto-generated TOCs
# Depth 2 (# ##): Recommended for most books
# Depth 3 (# ## ###): Good for technical/academic books
toc_depth: 2

# TOC files skipped for EPUB (Pandoc generates TOC automatically)
# Prevents epubcheck errors from manual TOC links without proper xhtml references
epub_skip_toc_files:
  - front-matter/toc.md
  - front-matter/toc-print.md

# Section order per book type
# "chapters" expands to all .md files in the chapters/ folder, sorted alphabetically.
# hardcover: null means fallback to paperback.
section_order:

  ebook:
    - front-matter/toc.md
    - front-matter/foreword.md
    - front-matter/preface.md
    - chapters
    - back-matter/epilogue.md
    - back-matter/glossary.md
    - back-matter/appendix.md
    - back-matter/acknowledgments.md
    - back-matter/about-the-author.md
    - back-matter/bibliography.md
    - back-matter/imprint.md

  paperback:
    - front-matter/toc-print.md
    - front-matter/foreword.md
    - front-matter/preface.md
    - chapters
    - back-matter/epilogue.md
    - back-matter/glossary.md
    - back-matter/appendix.md
    - back-matter/acknowledgments.md
    - back-matter/about-the-author.md
    - back-matter/bibliography.md
    - back-matter/imprint.md

  # Falls back to paperback
  hardcover: null

  # Audiobook: No TOC, no imprint, no bibliography
  # TTS-specific settings (voice, language, skip) are in voice-settings.yaml
  audiobook:
    - front-matter/foreword.md
    - front-matter/preface.md
    - chapters
    - back-matter/epilogue.md
    - back-matter/glossary.md
    - back-matter/appendix.md
    - back-matter/acknowledgments.md
    - back-matter/about-the-author.md

# Export defaults
# All values here can be overridden via CLI flags.
# Priority: CLI > export_defaults > built-in defaults
# Uncomment and set values as needed.
export_defaults:
# output_file: my-book          # Base name for output files (default: from pyproject.toml name)
# lang: en                      # Language code (default: from metadata.yaml)
# book_type: ebook              # ebook, paperback, hardcover, audiobook (default: ebook)
# format: pdf,epub              # Comma-separated formats to export
# cover: assets/covers/cover.jpg  # Path to cover image for EPUB
# epub2: false                  # Force EPUB 2 format
# extension: md                 # Custom file extension for markdown export
# toc_depth: 2                  # TOC depth (1-3)
# no_type_suffix: false         # Don't append _ebook/_paperback to filename
# use_manual_toc: false         # Use toc.md instead of auto-generated TOC
# skip_images: false            # Skip image path rewrites
# keep_relative_paths: false    # Keep relative paths (skip Steps 1 and 4)
# copy_epub_to: ~/Downloads     # Copy generated EPUB to this directory
