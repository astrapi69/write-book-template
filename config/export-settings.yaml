# Export configuration for full_export_book.py
# Controls Pandoc output formats, TOC behavior, and section ordering per book type.

# Supported output formats and their Pandoc targets
formats:
  markdown: gfm       # GitHub-Flavored Markdown
  pdf: pdf
  epub: epub
  docx: docx
  html: html

# Default TOC depth for auto-generated TOCs
# Depth 2 (# ##): Recommended for most books
# Depth 3 (# ## ###): Good for technical/academic books
toc_depth: 2

# TOC files skipped for EPUB (Pandoc generates TOC automatically)
# Prevents epubcheck errors from manual TOC links without proper xhtml references
epub_skip_toc_files:
  - front-matter/toc.md
  - front-matter/toc-print.md

# Section order per book type
# "chapters" expands to all .md files in the chapters/ folder, sorted alphabetically.
# hardcover: null means fallback to paperback.
section_order:

  ebook:
    - front-matter/toc.md
    - front-matter/foreword.md
    - front-matter/preface.md
    - chapters
    - back-matter/epilogue.md
    - back-matter/glossary.md
    - back-matter/appendix.md
    - back-matter/acknowledgments.md
    - back-matter/about-the-author.md
    - back-matter/bibliography.md
    - back-matter/imprint.md

  paperback:
    - front-matter/toc-print.md
    - front-matter/foreword.md
    - front-matter/preface.md
    - chapters
    - back-matter/epilogue.md
    - back-matter/glossary.md
    - back-matter/appendix.md
    - back-matter/acknowledgments.md
    - back-matter/about-the-author.md
    - back-matter/bibliography.md
    - back-matter/imprint.md

  # Falls back to paperback
  hardcover: null

  # Audiobook: No TOC, no imprint, no bibliography
  # TTS-specific settings (voice, language, skip) are in voice-settings.yaml
  audiobook:
    - front-matter/foreword.md
    - front-matter/preface.md
    - chapters
    - back-matter/epilogue.md
    - back-matter/glossary.md
    - back-matter/appendix.md
    - back-matter/acknowledgments.md
    - back-matter/about-the-author.md
